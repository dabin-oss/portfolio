<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design System · Club Minish · YDB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c10;
  --bg2: #0f1218;
  --bg3: #151a22;
  --bg-card: #12161e;
  --surface: #1a2030;
  --surface2: #1e2636;
  --blue: #2563eb;
  --blue-light: #3b82f6;
  --blue-dim: #1d4ed8;
  --blue-glow: rgba(37,99,235,0.18);
  --blue-subtle: rgba(37,99,235,0.08);
  --text: #f0f2f5;
  --text-secondary: #8b95a8;
  --text-muted: #4a5568;
  --border: rgba(255,255,255,0.07);
  --border-blue: rgba(37,99,235,0.3);
  --font: 'Pretendard', -apple-system, sans-serif;
  --radius: 12px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* =============================================
   PAGE SYSTEM
   ============================================= */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* =============================================
   MAIN NAV
   ============================================= */
#main-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  background: rgba(10,12,16,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
  cursor: pointer;
  text-decoration: none;
  transition: color var(--transition);
}
.nav-logo:hover { color: var(--blue-light); }

.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: color var(--transition);
}
.nav-links a:hover { color: var(--text); }

/* =============================================
   HERO SECTION
   ============================================= */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 48px 80px;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 40%, rgba(37,99,235,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(29,78,216,0.08) 0%, transparent 50%);
}

/* 우상단 고정 정보 */
.hero-top-right {
  position: absolute;
  top: 100px;
  right: 48px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  text-align: right;
}

.hero-tr-label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 3px;
}

.hero-tr-val {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  animation: heroFadeUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.05s forwards;
}
.hero-label::before {
  content: '';
  display: block;
  width: 28px;
  height: 1px;
  background: var(--blue-light);
}

.hero-title {
  font-size: clamp(52px, 7vw, 96px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: 28px;
}

.hero-title em {
  font-style: normal;
  background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #93c5fd 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 480px;
  margin-bottom: 48px;
}

.hero-meta {
  display: flex;
  gap: 32px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 60px;
}

.hero-scroll {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.hero-scroll-line {
  width: 40px;
  height: 1px;
  background: var(--text-muted);
  animation: scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine {
  0%,100% { transform: scaleX(1); opacity: 0.4; }
  50% { transform: scaleX(0.4); opacity: 1; }
}

/* 히어로 등장 애니메이션 */
@keyframes heroFadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hero-animate {
  opacity: 0;
  animation: heroFadeUp 0.7s cubic-bezier(0.4,0,0.2,1) forwards;
}

/* =============================================
   SECTIONS COMMON
   ============================================= */
section {
  padding: 100px 48px;
  position: relative;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label span {
  color: var(--text-muted);
  font-size: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
  max-width: 80px;
}

/* =============================================
   ABOUT SECTION
   ============================================= */
#about {
  background: var(--bg2);
  border-top: 1px solid var(--border);
}

.about-grid {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(320px, 1fr);
  gap: 80px;
  align-items: start;
}

.about-heading {
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.02em;
}

.about-heading em {
  font-style: italic;
  color: var(--blue-light);
}

.about-desc {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 48px;
}

.about-cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.about-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  transition: border-color var(--transition);
}
.about-card:hover { border-color: var(--border-blue); }

.about-card-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--blue-light);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}

.about-card-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}

.about-card-desc {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* =============================================
   WORK EXPERIENCE
   ============================================= */
#work {
  border-top: 1px solid var(--border);
}

.work-items {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.work-item {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
  background: var(--bg-card);
}
.work-item:hover { border-color: var(--border-blue); }

.work-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 36px;
  cursor: pointer;
  user-select: none;
}

.work-header-left h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 0;
  margin-top: 4px;
}

.work-header-left .work-meta {
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 0;
}

.work-role-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 10px;
  vertical-align: middle;
  margin-left: 10px;
  display: inline-block;
}

.work-toggle-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  margin-left: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  transition: all var(--transition);
  white-space: nowrap;
}

.work-toggle-btn .toggle-arrow {
  font-size: 16px;
  transition: transform var(--transition);
  display: inline-block;
}

.work-item:hover .work-toggle-btn {
  border-color: var(--border-blue);
  color: var(--blue-light);
  background: var(--blue-subtle);
}

.work-item.open .work-toggle-btn {
  background: var(--blue-subtle);
  border-color: var(--border-blue);
  color: var(--blue-light);
}

.work-item.open .work-toggle-btn .toggle-arrow {
  transform: rotate(180deg);
}

/* 기존 work-toggle-icon 호환 */
.work-toggle-icon { display: none; }

.work-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.38s cubic-bezier(0.4,0,0.2,1);
  background: var(--bg3);
  border-top: 0px solid var(--border);
}

.work-body-inner {
  overflow: hidden;
  padding: 0 36px;
  transition: padding 0.38s cubic-bezier(0.4,0,0.2,1);
}

.work-item.open .work-body {
  grid-template-rows: 1fr;
  border-top: 1px solid var(--border);
}

.work-item.open .work-body-inner {
  padding: 0 36px 32px;
}

/* 토글 힌트 (준비중 표시) */
.work-toggle-hint {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 500;
  color: var(--blue-light);
  background: var(--blue-subtle);
  border: 1px solid var(--border-blue);
  border-radius: 8px;
  padding: 9px 16px;
  margin-top: 20px;
  letter-spacing: 0.02em;
  opacity: 0.8;
}

.work-desc {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
  margin-top: 24px;
  margin-bottom: 24px;
  max-width: 680px;
}

.work-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.work-tag {
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
}

.work-stats {
  display: flex;
  gap: 32px;
  margin-bottom: 32px;
}

.work-stat dt {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}

.work-stat dd {
  font-size: 12px;
  color: var(--text-muted);
}

/* CTA 버튼 */
.cta-case-study {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--blue);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  padding: 16px 32px;
  border-radius: 10px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: -0.01em;
}
.cta-case-study:hover {
  background: var(--blue-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(37,99,235,0.35);
}
.cta-case-study svg {
  transition: transform var(--transition);
}
.cta-case-study:hover svg {
  transform: translateX(4px);
}

.cta-group {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.cta-design-system {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
  padding: 15px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  text-decoration: none;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: -0.01em;
}
.cta-design-system:hover {
  border-color: var(--border-blue);
  color: var(--blue-light);
  background: var(--blue-subtle);
}

/* Selected works gallery */
.works-gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-top: 32px;
}

.works-thumb {
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 16/10;
}

.works-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.7;
  transition: opacity var(--transition);
}
.works-thumb:hover img { opacity: 1; }

/* =============================================
   SKILLS
   ============================================= */
#skills {
  background: var(--bg2);
  border-top: 1px solid var(--border);
}

.skills-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.skills-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
}

.skills-group-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 20px;
}

.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.skill-tag {
  font-size: 15px;
  color: var(--text-secondary);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  transition: all var(--transition);
}
.skill-tag:hover {
  color: var(--text);
  border-color: var(--border-blue);
  background: var(--blue-subtle);
}

/* =============================================
   EDUCATION
   ============================================= */
#edu {
  border-top: 1px solid var(--border);
}

.edu-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.edu-degree-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 10px;
}

.edu-degree-sub {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.edu-cert-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.edu-cert-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: border-color var(--transition);
}
.edu-cert-card:hover { border-color: var(--border-blue); }

.edu-cert-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.edu-cert-sub {
  font-size: 16px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* =============================================
   CONTACT
   ============================================= */
#contact {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  text-align: center;
  position: relative;
  overflow: hidden;
}

#contact::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 500px;
  background: radial-gradient(ellipse at center, rgba(37,99,235,0.18) 0%, rgba(29,78,216,0.08) 40%, transparent 70%);
  pointer-events: none;
}

#contact > * {
  position: relative;
  z-index: 1;
}

.contact-tagline {
  font-size: clamp(16px, 2vw, 20px);
  color: var(--text-secondary);
  margin-bottom: 16px;
  font-style: italic;
}

.contact-email {
  font-size: clamp(28px, 4vw, 52px);
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
  text-decoration: none;
  display: block;
  margin-bottom: 40px;
  transition: color var(--transition);
}
.contact-email:hover { color: var(--blue-light); }

.contact-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--blue);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  padding: 16px 40px;
  border-radius: 10px;
  text-decoration: none;
  transition: all var(--transition);
}
.contact-btn:hover {
  background: var(--blue-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(37,99,235,0.35);
}

.contact-btns {
  display: flex;
  gap: 16px;
  justify-content: center;
  align-items: center;
}

.contact-btn-outline {
  background: transparent;
  border: 1.5px solid var(--border-blue);
  color: var(--blue-light);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.contact-btn-outline:hover {
  background: var(--blue-subtle);
  border-color: var(--blue-light);
  box-shadow: 0 8px 32px rgba(37,99,235,0.15);
  color: var(--text);
}

.footer-copy {
  margin-top: 80px;
  font-size: 12px;
  color: var(--text-muted);
  padding-top: 32px;
  border-top: 1px solid var(--border);
}

/* =============================================
   CASE STUDY PAGE
   ============================================= */
#page-case {
  position: relative;
}

/* 우측 세로 네비 */
.case-nav {
  position: fixed;
  right: 36px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.case-nav-line {
  width: 1px;
  background: var(--border);
  flex: 1;
  min-height: 20px;
}

.case-nav-item {
  display: flex;
  align-items: center;
  gap: 0;
  position: relative;
  cursor: pointer;
}

.case-nav-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1.5px solid var(--text-muted);
  background: transparent;
  transition: all 0.3s;
  flex-shrink: 0;
}

.case-nav-item.active .case-nav-dot {
  background: var(--blue-light);
  border-color: var(--blue-light);
  box-shadow: 0 0 0 4px var(--blue-glow);
  width: 10px;
  height: 10px;
}

.case-nav-label {
  position: absolute;
  right: 20px;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  text-align: right;
}

.case-nav-item:hover .case-nav-label,
.case-nav-item.active .case-nav-label {
  opacity: 1;
  color: var(--text-secondary);
}
.case-nav-item.active .case-nav-label {
  color: var(--blue-light);
  font-weight: 600;
}

/* Case Study sections */
.cs-section {
  padding: 100px 120px 100px 80px;
  border-bottom: 1px solid var(--border);
  max-width: 1200px;
}

.cs-intro-section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
  max-width: 100%;
  padding: 80px 80px 80px 80px;
}

@media (max-width: 900px) {
  .cs-intro-section { padding: 80px 40px 60px !important; }
}

@media (max-width: 600px) {
  .cs-intro-section { padding: 100px 20px 48px !important; }
}

.cs-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.cs-tag::before {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--blue-light);
}

.cs-heading {
  font-size: clamp(28px, 3.5vw, 48px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
}
.cs-heading em {
  font-style: italic;
  color: var(--blue-light);
}

.cs-body {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.85;
  max-width: 720px;
}

/* Hero section */
#cs-intro {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 80px 120px 80px 80px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}

.cs-intro-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 60% at 80% 30%, rgba(37,99,235,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 30% 40% at 10% 70%, rgba(29,78,216,0.07) 0%, transparent 50%);
}

.cs-kicker {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.cs-kicker::before {
  content: '';
  display: block;
  width: 28px;
  height: 1px;
  background: var(--blue-light);
}

.cs-main-title {
  font-size: clamp(40px, 5.5vw, 80px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 28px;
}
.cs-main-title em {
  font-style: italic;
  color: var(--blue-light);
}

.cs-main-sub {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.75;
  max-width: 540px;
  margin-bottom: 52px;
}

.cs-meta-grid {
  display: grid;
  grid-template-columns: repeat(5, auto);
  gap: 32px 48px;
  margin-bottom: 60px;
}

.cs-meta-item dt {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.cs-meta-item dd {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.cs-impact-row {
  display: flex;
  gap: 40px;
  padding: 28px 0;
  border-top: 1px solid var(--border);
}

.cs-impact-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cs-impact-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}

.cs-impact-label {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* back to home btn */
.cs-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 10px 0;
  border: none;
  background: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color var(--transition);
  margin-bottom: 60px;
  position: relative;
  z-index: 10;
}
.cs-back-btn:hover { color: var(--blue-light); }
.cs-back-btn svg { transition: transform var(--transition); }
.cs-back-btn:hover svg { transform: translateX(-4px); }

/* Summary cards */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-top: 40px;
}

.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
}

.summary-card-label {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--blue-light);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.summary-card-label svg {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
}

/* 제약 카드 - 붉은색 */
.summary-card.constraint {
  border-color: rgba(239,68,68,0.2);
}
.summary-card.constraint .summary-card-label {
  color: #f87171;
}
.summary-card.constraint:hover {
  border-color: rgba(239,68,68,0.4);
}

.summary-card-text {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
}

/* Research list */
.research-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 36px;
}

.research-table th {
  text-align: left;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  color: var(--text);
  padding: 14px 0;
  border-bottom: 2px solid var(--blue-dim);
}

.research-table td {
  padding: 16px 0;
  font-size: 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.research-table td:first-child {
  color: var(--text-secondary);
  width: 280px;
}

.research-table td:last-child {
  color: var(--text-secondary);
  font-size: 16px;
}

/* Insight cards */
.insight-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 36px;
}

.insight-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 32px;
  display: flex;
  gap: 24px;
  align-items: flex-start;
  transition: border-color var(--transition);
}
.insight-item:hover { border-color: var(--border-blue); }

.insight-num {
  font-size: 40px;
  font-weight: 800;
  color: var(--blue-light);
  flex-shrink: 0;
  opacity: 0.3;
  line-height: 1;
  margin-top: 2px;
  min-width: 52px;
}

.insight-text {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
}

/* Persona */
.persona-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 36px;
}

.persona-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
}

.persona-icon {
  font-size: 28px;
  margin-bottom: 16px;
}

.persona-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}

.persona-desc {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.persona-quote {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.7;
  font-style: italic;
  border-left: 2px solid var(--blue-dim);
  padding-left: 14px;
  margin-bottom: 16px;
}

.persona-pains {
  list-style: none;
  font-size: 16px;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.persona-pains li::before {
  content: '— ';
  color: var(--blue-dim);
}

/* Principles */
.principles-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 48px;
}

@media (max-width: 1100px) {
  .principles-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .principles-grid { grid-template-columns: 1fr; }
}

/* =============================================
   RESPONSIVE - TABLET (≤900px)
   ============================================= */
@media (max-width: 900px) {
  #main-nav { padding: 16px 24px; }
  .nav-links { gap: 20px; }
  #hero { padding: 0 24px 60px; }
  section { padding: 72px 24px; }
  .about-grid { grid-template-columns: 1fr; gap: 40px; }
  .about-heading { font-size: clamp(28px, 5vw, 42px); }
  .work-header { padding: 20px 24px; flex-wrap: wrap; gap: 12px; }
  .work-body-inner { padding: 0 24px; }
  .work-item.open .work-body-inner { padding: 0 24px 24px; }
  .work-stats { gap: 20px; flex-wrap: wrap; }
  .skills-grid { grid-template-columns: repeat(2, 1fr); }
  .edu-layout { grid-template-columns: 1fr; gap: 32px; }
  .cs-section { padding: 64px 32px; max-width: 100%; }
  #cs-intro { padding: 80px 32px 60px; min-height: auto; }
  .cs-main-title { font-size: clamp(36px, 6vw, 60px); }
  .cs-meta-grid { grid-template-columns: repeat(3, auto); gap: 20px 32px; }
  .cs-impact-row { flex-wrap: wrap; gap: 24px; }
  .summary-cards { grid-template-columns: 1fr; }
  .persona-grid { grid-template-columns: 1fr; }
  .principles-grid { grid-template-columns: repeat(2, 1fr); }
  .flow-compare { grid-template-columns: 1fr; }
  .screen-pair { grid-template-columns: 1fr !important; }
  .impact-metrics { grid-template-columns: repeat(3, 1fr); }
  .impact-table { font-size: 14px; }
  .case-nav { display: none; }
  .cs-footer { padding: 40px 24px; flex-direction: column; gap: 20px; text-align: center; }
}

/* =============================================
   RESPONSIVE - MOBILE (≤600px)
   ============================================= */
@media (max-width: 600px) {
  /* 네비 */
  #main-nav { padding: 14px 16px; }
  .nav-links { gap: 12px; }
  .nav-links a { font-size: 11px; }

  /* 히어로 */
  #hero { padding: 0 20px 52px; }
  .hero-title { font-size: clamp(36px, 10vw, 56px); line-height: 1.1; }
  .hero-sub { font-size: 14px; }
  .hero-meta { flex-direction: column; gap: 4px; font-size: 12px; }
  .hero-label { font-size: 10px; }

  /* 섹션 공통 */
  section { padding: 52px 20px; }
  .section-label { font-size: 10px; margin-bottom: 36px; }

  /* about */
  .about-heading { font-size: clamp(24px, 7vw, 36px); line-height: 1.2; }
  .about-desc { font-size: 14px; }
  .about-card-title { font-size: 15px; }
  .about-card-desc { font-size: 14px; }

  /* work */
  .work-header { padding: 16px 20px; }
  .work-header-left h3 { font-size: 15px; }
  .work-header-left .work-meta { font-size: 10px; }
  .work-role-badge { display: none; }
  .work-toggle-btn { font-size: 11px; padding: 6px 10px; }
  .work-body-inner { padding: 0 20px; }
  .work-item.open .work-body-inner { padding: 0 20px 20px; }
  .work-desc { font-size: 14px; }
  .work-tag { font-size: 12px; padding: 4px 10px; }
  .work-stats { flex-direction: column; gap: 12px; }
  .work-stat dt { font-size: 18px; }
  .works-gallery { grid-template-columns: 1fr; }
  .cta-group { flex-direction: column; align-items: flex-start; }
  .cta-case-study { font-size: 14px; padding: 14px 24px; }
  .cta-design-system { font-size: 13px; padding: 12px 20px; }

  /* skills */
  .skills-grid { grid-template-columns: 1fr; }
  .skills-group-title { font-size: 10px; }
  .skill-tag { font-size: 13px; }

  /* edu */
  .edu-cert-grid { grid-template-columns: 1fr; }
  .edu-degree-title { font-size: 18px; }
  .edu-cert-title { font-size: 14px; }
  .edu-cert-sub { font-size: 13px; }

  /* contact */
  .contact-btns { flex-direction: column; align-items: center; gap: 10px; }
  .contact-email { font-size: clamp(18px, 5.5vw, 32px); }
  .contact-tagline { font-size: 13px; }

  /* 케이스스터디 공통 */
  .cs-section { padding: 52px 20px; max-width: 100%; }

  /* cs-intro */
  #cs-intro {
    padding: 72px 20px 48px;
    min-height: 100vh;
    justify-content: flex-end;
  }
  .cs-kicker { font-size: 10px; margin-bottom: 16px; }
  .cs-main-title { font-size: clamp(28px, 8vw, 44px); line-height: 1.15; margin-bottom: 20px; }
  .cs-main-sub { font-size: 14px; margin-bottom: 32px; }
  .cs-meta-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 16px 20px;
    margin-bottom: 36px;
  }
  .cs-meta-item dt { font-size: 9px; }
  .cs-meta-item dd { font-size: 13px; }
  .cs-impact-row { gap: 14px; flex-wrap: wrap; padding: 20px 0; }
  .cs-impact-num { font-size: 20px; }
  .cs-impact-label { font-size: 11px; }
  .cs-back-btn { font-size: 10px; margin-bottom: 32px; }

  /* cs 본문 공통 */
  .cs-heading { font-size: clamp(22px, 6vw, 36px); }
  .cs-heading em { display: block; }
  .cs-body { font-size: 14px; }
  .cs-tag { font-size: 10px; }

  /* summary */
  .summary-card-label { font-size: 13px; }
  .summary-card-text { font-size: 14px; }

  /* research */
  .research-table td { font-size: 13px; padding: 12px 0; word-break: keep-all; }
  .research-table th { font-size: 13px; }
  .research-table td:first-child { width: 70%; }
  .research-table td:last-child { width: 30%; font-size: 13px; }

  /* insight */
  .insight-item { flex-direction: column; gap: 8px; padding: 20px; }
  .insight-num { font-size: 24px; }
  .insight-text { font-size: 14px; }

  /* persona */
  .persona-name { font-size: 15px; }
  .persona-quote { font-size: 13px; }
  .persona-pains { font-size: 13px; }

  /* principles */
  .principles-grid { grid-template-columns: 1fr; }
  .principle-title { height: auto; font-size: 16px; }
  .principle-desc { font-size: 13px; }

  /* flow */
  .flow-card-label { font-size: 13px; word-break: keep-all; }
  .flow-compare { grid-template-columns: 1fr; }
  .flow-card { padding: 20px 16px; }
  .flow-step { font-size: 13px; padding: 8px 10px; word-break: keep-all; overflow-wrap: break-word; }
  .flow-step-num { font-size: 12px; flex-shrink: 0; }

  /* screen */
  .change-list li { font-size: 13px; }
  .screen-caption { font-size: 12px; }

  /* impact metrics - 1열 전체 너비 */
  .impact-metrics { grid-template-columns: 1fr !important; gap: 12px; }
  .metric-card { padding: 28px 24px; width: 100%; }
  .metric-num { font-size: 40px; }
  .metric-label { font-size: 15px; }
  .metric-sub { font-size: 13px; }

  /* impact table - 가로 스크롤 */
  .impact-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius); }
  .impact-table { font-size: 13px; min-width: 500px; }
  .impact-table th { font-size: 12px; padding: 10px 10px; }
  .impact-table td { font-size: 13px; padding: 10px 10px; }

  /* reflection */
  .reflection-list li { font-size: 14px; padding: 16px 20px; }
  .quote-block { padding: 24px 20px; margin: 36px 0; }
  .quote-block p { font-size: 16px; }

  /* cs-footer */
  .cs-footer { padding: 32px 20px; flex-direction: column; gap: 16px; text-align: center; }
}

.principle-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  display: flex;
  flex-direction: column;
  min-height: 280px;
  transition: border-color var(--transition);
}
.principle-card:hover { border-color: var(--border-blue); }

.principle-num {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-align: center;
  width: 100%;
}

.principle-num svg { display: none; }

.principle-title {
  font-size: 18px;
  font-weight: 800;
  line-height: 1.45;
  color: var(--blue-light);
  text-align: center;
  word-break: keep-all;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.principle-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.75;
  border-top: 1px solid var(--border);
  padding-top: 16px;
  margin-top: 20px;
  word-break: keep-all;
}

/* Flow comparison */
.flow-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 36px;
}

@media (max-width: 900px) {
  .flow-compare { grid-template-columns: 1fr; }
}

@media (max-width: 600px) {
  .flow-compare {
    display: flex !important;
    flex-direction: column !important;
    gap: 16px;
  }
  .flow-card {
    width: 100% !important;
    min-width: 0 !important;
    box-sizing: border-box;
  }
}

.flow-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
}

.flow-card-label {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.01em;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.flow-card.before .flow-card-label { color: var(--text-muted); }
.flow-card.after .flow-card-label { color: var(--blue-light); }

.flow-steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.flow-step {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 16px;
  color: var(--text-secondary);
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--surface);
  word-break: keep-all;
  overflow-wrap: break-word;
}

.flow-step.highlight {
  background: var(--blue-subtle);
  color: var(--text);
  border: 1px solid var(--border-blue);
}

.flow-step-num {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-muted);
  width: 20px;
  flex-shrink: 0;
}
.flow-step.highlight .flow-step-num { color: var(--blue-light); }

/* Screen images */
.screen-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 32px 0;
}

.screen-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.screen-item img {
  width: 100%;
  display: block;
}

.screen-caption {
  padding: 16px 20px;
  font-size: 16px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
}

.screen-caption strong {
  color: var(--text-secondary);
  font-weight: 600;
}

.change-list {
  list-style: none;
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.change-list li {
  font-size: 16px;
  color: var(--text-secondary);
  padding-left: 22px;
  position: relative;
  line-height: 1.7;
}

.change-list li::before {
  content: '✓';
  position: absolute;
  left: 0;
  color: var(--blue-light);
  font-weight: 700;
}

.change-list li.bad::before {
  content: '✕';
  color: #ef4444;
}

/* Impact table */
.impact-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin: 36px 0;
}

.metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  text-align: center;
}

.metric-num {
  font-size: 44px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 8px;
  display: block;
}

.metric-label {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.metric-sub {
  font-size: 16px;
  color: var(--text-muted);
  margin-top: 6px;
}

.impact-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.impact-table th {
  text-align: left;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  color: var(--text);
  padding: 14px 16px;
  border-bottom: 2px solid var(--blue-dim);
}

.impact-table td {
  padding: 14px 16px;
  font-size: 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}

.impact-table td:first-child { color: var(--text); }

.impact-badge {
  display: inline-block;
  font-size: 14px;
  font-weight: 600;
  color: var(--blue-light);
  background: var(--blue-subtle);
  border-radius: 5px;
  padding: 3px 10px;
}

/* Reflection */
.reflection-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 36px;
}

.reflection-list li {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
  padding: 24px 28px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: 0 var(--radius) var(--radius) 0;
}

.quote-block {
  margin: 60px 0;
  padding: 40px 48px;
  border-left: 3px solid var(--blue-light);
  background: var(--blue-subtle);
  border-radius: 0 var(--radius) var(--radius) 0;
}

.quote-block p {
  font-size: 20px;
  font-weight: 600;
  font-style: italic;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 12px;
}

.quote-block cite {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  font-style: normal;
}

.reflection-bg-icon {
  position: absolute;
  right: 80px;
  top: 60px;
  width: 220px;
  height: 220px;
  color: var(--blue-light);
  opacity: 0.04;
  pointer-events: none;
}

.cs-footer {
  padding: 60px 80px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg2);
}

.cs-footer-name {
  font-size: 14px;
  color: var(--text-secondary);
}

.cs-footer-name strong {
  font-size: 18px;
  font-weight: 800;
  display: block;
  color: var(--text);
}

/* =============================================
   EMAIL COPY TOAST
   ============================================= */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(15, 30, 70, 0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(96, 165, 250, 0.45);
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(59,130,246,0.15);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* =============================================
   DESIGN SYSTEM PAGE
   ============================================= */
.ds-gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.ds-img-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
}
.ds-img-item:hover { border-color: var(--border-blue); }

.ds-img-item img {
  width: 100%;
  display: block;
  object-fit: cover;
}

.ds-img-caption {
  padding: 14px 18px;
  font-size: 13px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
}

.ds-img-placeholder {
  grid-column: 1 / -1;
  padding: 60px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

.ds-img-full {
  grid-column: 1 / -1;
}

@media (max-width: 600px) {
  .ds-gallery { grid-template-columns: 1fr; }
  .ds-img-full { grid-column: 1; }
}
/* =============================================
   CONTEXT FLOW DIAGRAM
   ============================================= */
.context-flow-diagram {
  margin-top: 32px;
  background: var(--bg-card);
  border: 1px solid var(--border-blue);
  border-radius: 16px;
  padding: 32px 36px;
}

.ctx-flow-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 28px;
}

.ctx-flow-row {
  display: flex;
  align-items: flex-start;
  gap: 0;
}

.ctx-actor {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 24px;
}

.ctx-actor-badge {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  border-radius: 6px;
  padding: 4px 12px;
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.ctx-actor-badge.inviter {
  background: rgba(99,102,241,0.12);
  color: #818cf8;
  border: 1px solid rgba(99,102,241,0.25);
}
.ctx-actor-badge.invitee {
  background: var(--blue-subtle);
  color: var(--blue-light);
  border: 1px solid var(--border-blue);
}

.ctx-actor-platform {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 16px;
  letter-spacing: 0.04em;
}

.ctx-actor-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ctx-action {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 8px 12px;
  background: var(--bg2);
  border-radius: 7px;
  border: 1px solid var(--border);
  line-height: 1.5;
}

.ctx-flow-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  min-width: 100px;
  gap: 8px;
  padding-top: 60px;
}

.ctx-arrow-line {
  width: 1px;
  height: 20px;
  background: var(--border-blue);
}

.ctx-arrow-label {
  font-size: 11px;
  color: var(--blue-light);
  text-align: center;
  line-height: 1.5;
  background: var(--blue-subtle);
  border: 1px solid var(--border-blue);
  border-radius: 7px;
  padding: 6px 10px;
  white-space: nowrap;
}

.ctx-flow-note {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 24px;
  padding: 14px 18px;
  background: var(--blue-subtle);
  border: 1px solid var(--border-blue);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.ctx-flow-note svg {
  flex-shrink: 0;
  margin-top: 2px;
  color: var(--blue-light);
}

/* =============================================
   INVITER PLACEHOLDER
   ============================================= */
.inviter-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 56px 40px;
  border: 1px dashed var(--border-blue);
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(99,102,241,0.04) 0%, var(--blue-subtle) 100%);
  text-align: center;
}

.inviter-placeholder-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.inviter-placeholder-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 16px;
}

.inviter-platform-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #818cf8;
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.25);
  border-radius: 6px;
  padding: 5px 14px;
}

/* =============================================
   FLOW SCREEN ROW (Before/After 화면 나열)
   ============================================= */
.flow-screens-row {
  display: grid;
  gap: 20px;
  padding-bottom: 0;
}

.flow-screens-row.before-screens {
  grid-template-columns: repeat(5, 1fr);
}

.flow-screens-row.after-screens {
  grid-template-columns: repeat(6, 1fr);
}

.flow-screen-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.flow-screen-item img {
  width: 100%;
  aspect-ratio: 9/16;
  object-fit: cover;
  object-position: top;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  transition: border-color var(--transition), transform var(--transition);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.flow-screen-item:hover img {
  border-color: var(--border-blue);
  transform: translateY(-3px);
}

.flow-screen-item.problem-screen img {
  border-color: rgba(239, 68, 68, 0.5);
  box-shadow: 0 4px 20px rgba(239,68,68,0.1);
}

.flow-screen-step {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 10px;
  letter-spacing: 0.06em;
}

.flow-screen-step.after {
  color: var(--blue-light);
  background: var(--blue-subtle);
  border-color: var(--border-blue);
}

.flow-screen-label {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.6;
  font-weight: 500;
}

.screen-label-issue {
  display: block;
  color: #ef4444;
  font-weight: 700;
  font-size: 11px;
  margin-top: 2px;
}

.screen-label-after {
  display: block;
  color: var(--blue-light);
  font-weight: 700;
  font-size: 11px;
  margin-top: 2px;
}

.after-screens .flow-screen-item img {
  border-color: var(--border-blue);
  box-shadow: 0 4px 20px rgba(37,99,235,0.12);
}

/* Flow card enhancements */
.flow-step.problem {
  border-left: 2px solid rgba(239, 68, 68, 0.4);
  background: rgba(239, 68, 68, 0.04);
}

.flow-step-tag {
  font-size: 10px;
  font-weight: 600;
  color: #ef4444;
  background: rgba(239, 68, 68, 0.1);
  border-radius: 4px;
  padding: 2px 7px;
  margin-left: 6px;
}

.flow-step-tag-after {
  font-size: 10px;
  font-weight: 600;
  color: var(--blue-light);
  background: var(--blue-subtle);
  border-radius: 4px;
  padding: 2px 7px;
  margin-left: 6px;
}

.flow-key-change {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 20px;
  padding: 14px 16px;
  background: var(--blue-subtle);
  border: 1px solid var(--border-blue);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.flow-key-change svg {
  flex-shrink: 0;
  margin-top: 2px;
  color: var(--blue-light);
}

/* Key change cards */
.key-change-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.key-change-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  transition: border-color var(--transition);
}
.key-change-card:hover { border-color: var(--border-blue); }

.key-change-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
}
.problem-icon {
  background: rgba(239,68,68,0.1);
  color: #ef4444;
}
.after-icon {
  background: var(--blue-subtle);
  color: var(--blue-light);
}

.key-change-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}

.key-change-body {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

/* =============================================
   HERO PROJECT STRIP
   ============================================= */
.hero-project-strip {
  margin-bottom: 40px;
  max-width: 720px;
}

.hero-project-card {
  background: rgba(26, 32, 48, 0.7);
  border: 1px solid var(--border-blue);
  border-radius: 14px;
  padding: 20px 28px;
  transition: all var(--transition);
  backdrop-filter: blur(8px);
}
.hero-project-card:hover {
  background: rgba(37, 99, 235, 0.08);
  border-color: rgba(59, 130, 246, 0.5);
  transform: translateY(-2px);
}

.hero-proj-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.hero-proj-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--blue-light);
}

.hero-proj-arrow {
  font-size: 14px;
  color: var(--blue-light);
  transition: transform var(--transition);
}
.hero-project-card:hover .hero-proj-arrow {
  transform: translateX(4px);
}

.hero-proj-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.4;
}

.hero-proj-kpis {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.hero-proj-kpi {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.hero-proj-kpi-num {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
}

.hero-proj-kpi-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

/* =============================================
   ANIMATIONS
   ============================================= */
.fade-up {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-up.visible {
  opacity: 1;
  transform: none;
}

/* =============================================
   WORK SCOPE ROW
   ============================================= */
.work-scope-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 16px 0 24px;
  flex-wrap: wrap;
}

.work-scope-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
}

.work-scope-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.work-scope-chip {
  font-size: 12px;
  font-weight: 600;
  color: var(--blue-light);
  background: var(--blue-subtle);
  border: 1px solid var(--border-blue);
  border-radius: 6px;
  padding: 4px 12px;
}

/* =============================================
   WORK CONTEXT NOTE
   ============================================= */
.work-context-note {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin: 16px 0 24px;
  padding: 14px 18px;
  background: var(--blue-subtle);
  border: 1px solid var(--border-blue);
  border-radius: 10px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 640px;
}

.work-context-note svg {
  flex-shrink: 0;
  margin-top: 3px;
  color: var(--blue-light);
}

/* =============================================
   WORKS THUMB CAPTION
   ============================================= */
.works-thumb {
  position: relative;
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 16/10;
}

.works-thumb-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  background: linear-gradient(to top, rgba(10,12,16,0.92) 0%, transparent 100%);
  font-size: 11px;
  color: var(--text-secondary);
  opacity: 0;
  transition: opacity var(--transition);
  line-height: 1.5;
}
.works-thumb:hover .works-thumb-caption { opacity: 1; }
